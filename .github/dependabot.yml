version: 2
updates:
  # npm dependencies (Worker runtime + tooling).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
